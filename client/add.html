<!doctype html>
<html>
    <head>
        <title>scan and add book</title>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
                
            html {
                font-family: "Roboto";
            }
        </style>

    </head>
    <body>
        Books v1.3.1 (18.05.2026)
        <a id="exit" href="/">&lt;- Home</a>
        <p>сканнировать ISBN штрихкод:</p>
        <div id="reader" width="400px"></div>
        
        <p>ISBN: <input id="isbn"></p>
        <p>Писатель: <input id="author"></p>
        <p>Имя книги: <input id="name"></p>
        <label for="shelf">kolonne - rad (<em>Eks. kolonne <b>1</b> og rad <b>2</b> => <b>1 - 2</b></em> ):</label> 
        <select id="shelf" name="shelf">
            <option value="one-one">1 - 1</option>
            <option value="one-two">1 - 2</option>
            <option value="one-three">1 - 3</option>
            <hr>
            <option value="two-one">2 - 1</option>
            <option value="two-two">2 - 2</option>
            <option value="two-three">3 - 2</option>
            <hr>
            <option value="three-one">3 - 1</option>
            <option value="three-two">3 - 2</option>
            <option value="three-three">3 - 3</option>
            <hr>
            <option value="four-one">4 - 1</option>
            <option value="four-two">4 - 2</option>
            <option value="four-three">4 - 3</option>
        </select>
        <br>
        <br>

        <button onclick="add()">Добавить книгу</button>

        <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
        
        <script src="add.js"></script>
    </body>
</html>
